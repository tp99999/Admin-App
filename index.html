<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color, #f3f4f6); color: var(--tg-theme-text-color, #1f2937); }
        .tab-btn.active { border-bottom: 2px solid var(--tg-theme-button-color, #3b82f6); color: var(--tg-theme-button-color, #3b82f6); font-weight: bold; }
        .card { background-color: var(--tg-theme-secondary-bg-color, #ffffff); border: 1px solid var(--tg-theme-hint-color, #e5e7eb); }
    </style>
</head>
<body class="antialiased min-h-screen pb-10">

    <!-- Header -->
    <div class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 shadow-sm" style="background-color: var(--tg-theme-bg-color);">
        <div class="flex justify-around">
            <button onclick="switchTab('users')" id="btn-users" class="tab-btn active w-1/3 py-3 text-sm text-center flex flex-col items-center gap-1 transition-all">
                <i class="fas fa-users text-lg"></i> Users (<span id="count-users">0</span>)
            </button>
            <button onclick="switchTab('monitors')" id="btn-monitors" class="tab-btn w-1/3 py-3 text-sm text-center flex flex-col items-center gap-1 transition-all text-gray-500">
                <i class="fas fa-eye text-lg"></i> Đang chạy (<span id="count-monitors">0</span>)
            </button>
            <button onclick="switchTab('codes')" id="btn-codes" class="tab-btn w-1/3 py-3 text-sm text-center flex flex-col items-center gap-1 transition-all text-gray-500">
                <i class="fas fa-ticket-alt text-lg"></i> Codes (<span id="count-codes">0</span>)
            </button>
        </div>
    </div>

    <div class="p-4" id="main-content">
        <!-- Error Message -->
        <div id="error-msg" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4"></div>

        <!-- TABS CONTENT -->
        <!-- Tab: Users -->
        <div id="tab-users" class="space-y-4">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                <input type="text" id="search-users" onkeyup="filterUsers()" placeholder="Tìm tên, username, ID..." class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400" style="background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color);">
            </div>
            <div id="list-users" class="space-y-3">
                <!-- User Items render here -->
            </div>
        </div>

        <!-- Tab: Monitors -->
        <div id="tab-monitors" class="hidden space-y-3">
            <div id="list-monitors" class="space-y-3">
                 <!-- Monitor Items render here -->
            </div>
        </div>

        <!-- Tab: Codes -->
        <div id="tab-codes" class="hidden space-y-3">
            <div id="list-codes" class="space-y-3">
                 <!-- Code Items render here -->
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let allData = { u: [], c: [], m: [] };

        // Parse Data from URL
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('data');
            
            if (dataParam) {
                try {
                    const decodedData = decodeURIComponent(dataParam);
                    const jsonString = atob(decodedData);
                    allData = JSON.parse(decodeURIComponent(escape(jsonString)));
                    
                    document.getElementById('count-users').innerText = allData.u.length;
                    document.getElementById('count-monitors').innerText = allData.m.length;
                    document.getElementById('count-codes').innerText = allData.c.length;

                    renderUsers(allData.u);
                    renderMonitors(allData.m);
                    renderCodes(allData.c);
                } catch (e) {
                    showError("Lỗi đọc dữ liệu! Có thể đường dẫn quá dài hoặc bị hỏng.");
                    console.error(e);
                }
            } else {
                showError("Không tìm thấy dữ liệu.");
            }
        };

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.innerText = msg;
            el.classList.remove('hidden');
        }

        function switchTab(tabId) {
            ['users', 'monitors', 'codes'].forEach(id => {
                document.getElementById(`tab-${id}`).classList.add('hidden');
                document.getElementById(`btn-${id}`).classList.remove('active');
                document.getElementById(`btn-${id}`).classList.add('text-gray-500');
            });
            
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`btn-${tabId}`).classList.add('active');
            document.getElementById(`btn-${tabId}`).classList.remove('text-gray-500');
        }

        // Format Date
        const formatDate = (timestamp) => {
            if (!timestamp) return "N/A";
            const d = new Date(timestamp * 1000);
            return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} ${d.getHours()}:${d.getMinutes()}`;
        };

        // Render Users
        function renderUsers(users) {
            const container = document.getElementById('list-users');
            container.innerHTML = '';
            
            if(users.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 mt-5">Không có dữ liệu.</div>';
                return;
            }

            users.forEach(user => {
                const roleColors = { basic: 'bg-gray-200 text-gray-700', pro: 'bg-blue-100 text-blue-700 border-blue-200', ultra: 'bg-purple-100 text-purple-700 border-purple-200', admin: 'bg-red-100 text-red-700 border-red-200' };
                const color = roleColors[user.r] || roleColors.basic;
                const expDate = user.e ? `<span class="text-xs text-red-500"><i class="fas fa-clock"></i> Hết hạn: ${formatDate(user.e)}</span>` : '<span class="text-xs text-green-500">Vĩnh viễn</span>';
                
                const html = `
                    <div class="card rounded-2xl p-4 shadow-sm user-card" data-search="${user.n} ${user.u} ${user.i}".toLowerCase()>
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="font-bold text-lg">${user.n}</h3>
                                <p class="text-sm text-gray-500">@${user.u} | ID: ${user.i}</p>
                            </div>
                            <span class="px-2 py-1 rounded-lg text-xs font-bold uppercase border ${color}">${user.r}</span>
                        </div>
                        <div class="flex justify-between items-end mt-3 border-t pt-2 border-gray-100">
                            <span class="text-xs text-gray-400">Tham gia: ${formatDate(user.j)}</span>
                            ${expDate}
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // Render Monitors
        function renderMonitors(monitors) {
            const container = document.getElementById('list-monitors');
            container.innerHTML = '';
            
            if(monitors.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 mt-5">Không có UID nào đang chạy.</div>';
                return;
            }

            monitors.forEach(m => {
                const isLive = m.s === 'LIVE';
                const html = `
                    <div class="card rounded-2xl p-4 shadow-sm flex items-center justify-between">
                        <div>
                            <div class="font-mono font-bold text-lg">${m.u}</div>
                            <div class="text-xs text-gray-500"><i class="fas fa-user-circle"></i> Added by: <b>${m.o}</b></div>
                            <div class="text-xs text-gray-400 mt-1">${formatDate(m.t)}</div>
                        </div>
                        <div class="px-3 py-1 rounded-full text-sm font-bold ${isLive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${isLive ? '<i class="fas fa-circle text-xs"></i> LIVE' : '<i class="fas fa-times-circle text-xs"></i> DIE'}
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // Render Codes
        function renderCodes(codes) {
            const container = document.getElementById('list-codes');
            container.innerHTML = '';
            
            if(codes.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 mt-5">Chưa có mã code nào được tạo.</div>';
                return;
            }

            codes.forEach(c => {
                const html = `
                    <div class="card rounded-2xl p-4 shadow-sm relative overflow-hidden">
                        <div class="absolute right-0 top-0 bg-gray-100 px-3 py-1 text-xs font-bold rounded-bl-lg text-gray-600">
                            Lượt: ${c.u === -1 ? 'Vô hạn' : c.u}
                        </div>
                        <div class="font-mono text-xl font-bold text-blue-600 mb-1">${c.c}</div>
                        <div class="flex gap-2 mb-2">
                            <span class="bg-gray-100 px-2 py-1 rounded text-xs font-bold uppercase text-gray-700"><i class="fas fa-crown text-yellow-500"></i> ${c.r}</span>
                            <span class="bg-gray-100 px-2 py-1 rounded text-xs font-bold text-gray-700"><i class="fas fa-calendar-alt"></i> ${c.d} Ngày</span>
                        </div>
                        <div class="text-xs text-gray-400 mt-2 border-t pt-2">
                            Tạo lúc: ${formatDate(c.t)}
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // Search Users
        function filterUsers() {
            const query = document.getElementById('search-users').value.toLowerCase();
            const cards = document.querySelectorAll('.user-card');
            cards.forEach(card => {
                const text = card.getAttribute('data-search');
                if (text.includes(query)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
