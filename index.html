<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel - LiveDie Bot</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel cho JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; -webkit-tap-highlight-color: transparent;}
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #60a5fa; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Helper giải mã dữ liệu từ URL Base64
        function getPayloadFromUrl() {
            try {
                const params = new URLSearchParams(window.location.search);
                const base64Data = params.get('data');
                if (!base64Data) return null;
                const jsonStr = decodeURIComponent(escape(atob(base64Data)));
                return JSON.parse(jsonStr);
            } catch (e) {
                console.error("Lỗi parse data:", e);
                return null;
            }
        }

        const formatDate = (ts) => {
            if (!ts) return "-";
            const d = new Date(ts * 1000);
            return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth()+1).toString().padStart(2, '0')}/${d.getFullYear()}`;
        };

        const Badge = ({ role }) => {
            const colors = {
                admin: "bg-red-500/20 text-red-400 border-red-500/50",
                ultra: "bg-purple-500/20 text-purple-400 border-purple-500/50",
                pro: "bg-blue-500/20 text-blue-400 border-blue-500/50",
                basic: "bg-gray-500/20 text-gray-400 border-gray-500/50"
            };
            return (
                <span className={`px-2 py-1 text-xs rounded-full border ${colors[role] || colors.basic} font-medium uppercase tracking-wider`}>
                    {role}
                </span>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('users');
            const [data, setData] = useState({ users: [], monitors: [], codes: [] });
            const [searchUser, setSearchUser] = useState('');

            useEffect(() => {
                const payload = getPayloadFromUrl();
                if (payload) {
                    setData(payload);
                }
            }, []);

            // Icons rendering setup for Lucide after React mount
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            const filteredUsers = useMemo(() => {
                return data.users.filter(u => 
                    (u.n || '').toLowerCase().includes(searchUser.toLowerCase()) || 
                    (u.u || '').toLowerCase().includes(searchUser.toLowerCase()) ||
                    (u.i || '').includes(searchUser)
                );
            }, [data.users, searchUser]);

            if (!data.users.length && !data.monitors.length && !data.codes.length) {
                return (
                    <div className="flex h-screen items-center justify-center p-4 text-center">
                        <div className="glass-panel p-8 rounded-2xl max-w-sm w-full">
                            <i data-lucide="shield-alert" className="mx-auto h-12 w-12 text-slate-400 mb-4"></i>
                            <h2 className="text-xl font-bold mb-2">Không tìm thấy dữ liệu</h2>
                            <p className="text-slate-400 text-sm">Vui lòng mở Mini App này trực tiếp từ Telegram Bot thông qua lệnh /date.</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto p-2 sm:p-4 pb-20">
                    {/* Header Stats */}
                    <div className="grid grid-cols-3 gap-3 mb-6">
                        <div className="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center">
                            <i data-lucide="users" className="h-6 w-6 text-blue-400 mb-2"></i>
                            <div className="text-2xl font-bold">{data.users.length}</div>
                            <div className="text-xs text-slate-400 uppercase tracking-wide">Users</div>
                        </div>
                        <div className="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center">
                            <i data-lucide="activity" className="h-6 w-6 text-green-400 mb-2"></i>
                            <div className="text-2xl font-bold">{data.monitors.length}</div>
                            <div className="text-xs text-slate-400 uppercase tracking-wide">Monitors</div>
                        </div>
                        <div className="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center">
                            <i data-lucide="ticket" className="h-6 w-6 text-purple-400 mb-2"></i>
                            <div className="text-2xl font-bold">{data.codes.length}</div>
                            <div className="text-xs text-slate-400 uppercase tracking-wide">Codes Active</div>
                        </div>
                    </div>

                    {/* Tabs Navigation */}
                    <div className="flex border-b border-slate-700 mb-6">
                        <button onClick={() => setActiveTab('users')} className={`flex-1 py-3 text-sm font-medium transition-colors tab-btn ${activeTab === 'users' ? 'active' : 'text-slate-400 hover:text-slate-200'}`}>
                            Users
                        </button>
                        <button onClick={() => setActiveTab('monitors')} className={`flex-1 py-3 text-sm font-medium transition-colors tab-btn ${activeTab === 'monitors' ? 'active' : 'text-slate-400 hover:text-slate-200'}`}>
                            Hệ thống Check
                        </button>
                        <button onClick={() => setActiveTab('codes')} className={`flex-1 py-3 text-sm font-medium transition-colors tab-btn ${activeTab === 'codes' ? 'active' : 'text-slate-400 hover:text-slate-200'}`}>
                            Mã Quà Tặng
                        </button>
                    </div>

                    {/* TAB: USERS */}
                    {activeTab === 'users' && (
                        <div className="animate-fade-in">
                            <div className="relative mb-4">
                                <i data-lucide="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="Tìm kiếm theo Tên, Username hoặc ID..." 
                                    value={searchUser}
                                    onChange={(e) => setSearchUser(e.target.value)}
                                    className="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:border-blue-500 transition-colors"
                                />
                            </div>
                            
                            <div className="glass-panel rounded-xl overflow-hidden">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm text-left">
                                        <thead className="text-xs text-slate-400 bg-slate-800/50 uppercase">
                                            <tr>
                                                <th className="px-4 py-3">User Info</th>
                                                <th className="px-4 py-3">Cấp Bậc</th>
                                                <th className="px-4 py-3 text-right">Ngày Tham Gia</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-700/50">
                                            {filteredUsers.map((u, idx) => (
                                                <tr key={idx} className="hover:bg-slate-800/30 transition-colors">
                                                    <td className="px-4 py-3">
                                                        <div className="font-medium text-slate-200">{u.n || 'Unknown'}</div>
                                                        <div className="text-xs text-slate-400 flex items-center gap-1 mt-0.5">
                                                            <span>{u.i}</span>
                                                            {u.u && <span>• @{u.u}</span>}
                                                        </div>
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <Badge role={u.r} />
                                                    </td>
                                                    <td className="px-4 py-3 text-right text-slate-400">
                                                        {formatDate(u.j)}
                                                    </td>
                                                </tr>
                                            ))}
                                            {filteredUsers.length === 0 && (
                                                <tr><td colSpan="3" className="px-4 py-8 text-center text-slate-500">Không có dữ liệu</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TAB: MONITORS */}
                    {activeTab === 'monitors' && (
                        <div className="animate-fade-in glass-panel rounded-xl overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left">
                                    <thead className="text-xs text-slate-400 bg-slate-800/50 uppercase">
                                        <tr>
                                            <th className="px-4 py-3">Target UID</th>
                                            <th className="px-4 py-3">Trạng Thái</th>
                                            <th className="px-4 py-3">Ghi Chú</th>
                                            <th className="px-4 py-3 text-right">Người Add</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-700/50">
                                        {data.monitors.map((m, idx) => (
                                            <tr key={idx} className="hover:bg-slate-800/30 transition-colors">
                                                <td className="px-4 py-3 font-mono text-slate-300">{m.u}</td>
                                                <td className="px-4 py-3">
                                                    <span className={`flex items-center gap-1 text-xs font-medium ${m.s === 'LIVE' ? 'text-green-400' : 'text-red-400'}`}>
                                                        <span className={`w-2 h-2 rounded-full ${m.s === 'LIVE' ? 'bg-green-500' : 'bg-red-500'}`}></span>
                                                        {m.s}
                                                    </span>
                                                </td>
                                                <td className="px-4 py-3 text-slate-400 truncate max-w-[120px]">{m.n}</td>
                                                <td className="px-4 py-3 text-right text-slate-400 text-xs truncate max-w-[100px]" title={m.o}>
                                                    {m.o}
                                                </td>
                                            </tr>
                                        ))}
                                        {data.monitors.length === 0 && (
                                            <tr><td colSpan="4" className="px-4 py-8 text-center text-slate-500">Hệ thống chưa có UID nào được chạy ngầm</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* TAB: CODES */}
                    {activeTab === 'codes' && (
                        <div className="animate-fade-in glass-panel rounded-xl overflow-hidden">
                            <div className="p-4 bg-slate-800/50 border-b border-slate-700 text-sm text-slate-300">
                                💡 Gợi ý: Tạo code trên Telegram bằng lệnh <code className="bg-slate-900 px-1 py-0.5 rounded text-blue-300">/reg_code</code>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left">
                                    <thead className="text-xs text-slate-400 bg-slate-800/50 uppercase">
                                        <tr>
                                            <th className="px-4 py-3">Mã Code</th>
                                            <th className="px-4 py-3">Quyền lợi</th>
                                            <th className="px-4 py-3 text-right">Lượt dùng</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-700/50">
                                        {data.codes.map((c, idx) => (
                                            <tr key={idx} className="hover:bg-slate-800/30 transition-colors">
                                                <td className="px-4 py-3">
                                                    <div className="font-mono font-bold text-yellow-400">{c.c}</div>
                                                    <div className="text-xs text-slate-500 mt-1">Tạo: {formatDate(c.t)}</div>
                                                </td>
                                                <td className="px-4 py-3">
                                                    <div className="flex flex-col items-start gap-1">
                                                        <Badge role={c.r} />
                                                        <span className="text-xs text-slate-400">+{c.d} ngày</span>
                                                    </div>
                                                </td>
                                                <td className="px-4 py-3 text-right">
                                                    {c.u === -1 ? (
                                                        <span className="text-emerald-400 font-medium text-xs bg-emerald-400/10 px-2 py-1 rounded-full">Vô hạn</span>
                                                    ) : (
                                                        <span className="font-medium">{c.u} lượt</span>
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                        {data.codes.length === 0 && (
                                            <tr><td colSpan="3" className="px-4 py-8 text-center text-slate-500">Chưa có mã Code nào được tạo</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
